<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ORA · ASSINAR</title>
<style>
:root{--bg:#000;--c:#00fff7;--jade:#00ff88;--amber:#ffb800;--red:#ff4444;--dim:rgba(0,255,247,.12);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Courier New',monospace;background:var(--bg);color:var(--c);min-height:100vh;padding:20px 14px;}
.hd-title{font-size:1.9em;font-weight:bold;letter-spacing:.12em;line-height:1;}
.hd-title span{color:var(--jade);}
.hd-sub{font-size:8px;letter-spacing:.3em;color:rgba(0,255,247,.5);margin-bottom:4px;}
.campo-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.campo-pill{border:1px solid var(--dim);padding:6px 10px;}
.campo-pill lbl{font-size:7px;color:var(--c);display:block;}
.campo-pill b{color:var(--jade);font-size:13px;display:block;}
.wallet-strip{border:1px solid var(--dim);padding:10px 12px;margin-bottom:12px;font-size:.9em;word-break:break-all;}
.addr{color:var(--jade);}
.ops-title{font-size:8px;letter-spacing:.3em;color:var(--amber);margin-bottom:6px;}
.op{border:1px solid var(--dim);padding:16px 10px;margin-bottom:10px;}
.op-tipo{font-size:9px;color:rgba(0,255,247,.3);}
.op-desc{font-size:11px;color:var(--amber);margin-bottom:4px;line-height:1.5;}
.op-valor{font-size:18px;font-weight:bold;color:var(--jade);margin:6px 0;}
.op-ts{font-size:8px;color:rgba(0,255,247,.4);margin-bottom:4px;}
.op-acoes{display:flex;gap:8px;margin-top:12px;}
.btn{background:transparent;border:1px solid var(--dim);flex:1;-webkit-tap-highlight-color:transparent;padding:8px 14px;cursor:pointer;font-family:inherit;font-size:9px;letter-spacing:.15em;}
.btn-ok{border-color:var(--jade);color:var(--jade);}
.btn-ok:active{background:var(--jade);color:#000;}
.btn-rej{border-color:var(--red);color:var(--red);}
.btn-rej:active{background:var(--red);color:#000;}
.vazio{font-size:9px;color:rgba(0,255,247,.4);margin-bottom:16px;}
.log{border:1px solid var(--dim);padding:10px;max-height:120px;overflow-y:auto;margin-bottom:18px;}
.ll{font-size:8px;color:rgba(0,255,247,.4);margin-bottom:2px;line-height:1.5;}
.rejbox{border:1px solid var(--red);padding:12px;margin-bottom:12px;display:none;}
.rejbox input{background:transparent;border:1px solid var(--dim);color:var(--c);font-family:inherit;font-size:9px;padding:8px;width:100%;margin-bottom:8px;}
.actions-bar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.actions-bar .btn{flex:unset;padding:8px 12px;}
.cbwallet-btn{display:none;width:100%;margin-bottom:10px;text-align:center;text-decoration:none;color:var(--jade);font-size:9px;padding:10px;background:rgba(0,255,136,.15);border:1px solid var(--jade);letter-spacing:.2em;}
footer{border-top:1px solid var(--dim);padding-top:12px;font-size:7px;color:rgba(0,255,247,.18);text-align:center;line-height:1.4;margin-top:20px;}
.loading{font-size:9px;color:rgba(0,255,247,.4);padding:10px 0;}
</style>
</head>
<body>
<a class="cbwallet-btn" id="cbwallet-btn" href="#">⊕ ABRIR NO COINBASE WALLET</a>
<div class="hd-sub">FRONT · GITHUB PAGES · DADOS · SUPABASE</div>
<div class="hd-title">ORA <span>ASSINAR</span></div>
<div class="campo-bar" id="campoBar">
  <div class="loading">a carregar campo...</div>
</div>
<div class="wallet-strip">
  <span class="addr" id="wAddr">— wallet não ligada —</span>
  <span id="wStatus" style="color:var(--amber);font-size:8px"> · a detectar...</span>
</div>
<div class="actions-bar">
  <button class="btn btn-ok" onclick="ligar()">LIGAR WALLET</button>
  <button class="btn" onclick="refrescar()">ACTUALIZAR</button>
  <button class="btn" onclick="document.getElementById('log').innerHTML=''">LIMPAR LOG</button>
</div>
<div id="log" class="log"></div>
<div id="rejbox" class="rejbox">
  <div style="font-size:8px;color:var(--red);margin-bottom:10px;">MOTIVO DA REJEIÇÃO</div>
  <input type="text" id="rejMotivo" placeholder="motivo (opcional)">
  <button class="btn" onclick="fecharRej()">CANCELAR</button>
  <button class="btn btn-rej" onclick="enviarRejeicao()">CONFIRMAR REJEIÇÃO</button>
</div>
<div class="ops-title" id="opsTitle">PROPOSTAS PENDENTES</div>
<div id="opsList"><div class="loading">a carregar propostas...</div></div>
<footer id="foot">ORUM · ORA + UNUM · O SÍMBOLO É REAL E NÃO PEDE PROVA · front:github-pages · back:supabase</footer>

<script>
const SUPABASE_BASE = 'https://ywabnlhkmhbyewqhbsjm.supabase.co/functions/v1';
const API_ASSINAR = SUPABASE_BASE + '/ora-assinar';
const API_OPERATIONS = SUPABASE_BASE + '/ora-operations';
const API_AGENTE = SUPABASE_BASE + '/orai-agente';
const SAGRADA = '0xFEd69e8ee87A1F0fBbF8409ab654FC51832cDEe5';
let account = null;

function dn(d){return [d.getHours(),d.getMinutes(),d.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');}
function logMsg(msg,cor){
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = 'll';
  d.innerHTML = '['+dn(new Date())+'] <span style="color:'+cor+'">'+msg+'</span>';
  el.insertBefore(d, el.firstChild);
}
function escHtml(s){
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function sanitizeDesc(s){
  return String(s ?? '').replace(/[^\x20-\x7E\u00C0-\u00FF\n]/g,'').slice(0,220);
}

async function carregarEstado(){
  try{
    const r = await fetch(API_AGENTE + '?mode=state', { cache:'no-store' });
    const j = await r.json();
    const dia = j?.campo?.dia ?? '?';
    const sigma = typeof j?.campo?.sigma === 'number' ? j.campo.sigma.toFixed(4) : '—';
    const epoch = j?.campo?.epoch ?? 'ETERNIDADE';
    const sustento = j?.campo?.sustento_eur ?? '';
    document.getElementById('campoBar').innerHTML =
      '<div class="campo-pill"><lbl>SIGMA</lbl><b>σ='+sigma+'</b></div>'+
      '<div class="campo-pill"><lbl>DIA</lbl><b>D'+dia+'</b></div>'+
      '<div class="campo-pill"><lbl>SUSTENTO</lbl><b>'+(sustento?('€'+sustento):'—')+'</b></div>'+
      '<div class="campo-pill"><lbl>ÉPOCA</lbl><b>'+epoch+'</b></div>';
    document.getElementById('foot').innerHTML =
      'ORUM · ORA + UNUM · O SÍMBOLO É REAL E NÃO PEDE PROVA · front:github-pages · back:supabase<br>SAGRADA='+SAGRADA;
  }catch(e){
    document.getElementById('campoBar').innerHTML = '<div class="loading" style="color:var(--red)">erro a carregar campo: '+escHtml(e.message)+'</div>';
  }
}

async function carregarPropostas(){
  try{
    const r = await fetch(API_OPERATIONS + '?action=pending', { cache:'no-store' });
    const j = await r.json();
    const pendentes = Array.isArray(j?.pendentes) ? j.pendentes : [];
    document.getElementById('opsTitle').textContent = 'PROPOSTAS PENDENTES ('+pendentes.length+')';
    if(pendentes.length === 0){
      document.getElementById('opsList').innerHTML = '<div class="vazio">— sem propostas pendentes —</div>';
      return;
    }
    document.getElementById('opsList').innerHTML = pendentes.map(p => {
      const descSafe = sanitizeDesc(p.descricao);
      const descHex = Array.from(new TextEncoder().encode(descSafe)).map(b=>b.toString(16).padStart(2,'0')).join('');
      const tipo = p.tipo ?? 'operacao';
      const rail = p.payment_rail ?? '';
      const valorMatch = descSafe.match(/(EUR|€)\s?([\d.,]+)/i);
      const valor = valorMatch ? valorMatch[2] : '';
      const ts = p.criado_em ? new Date(p.criado_em).toLocaleString('pt-PT') : '';
      return '<div class="op" id="op-'+p.id+'">'+
        '<div class="op-tipo">'+escHtml(tipo)+' · '+escHtml(rail)+'</div>'+
        '<div class="op-desc">'+escHtml(descSafe)+'</div>'+
        (valor ? '<div class="op-valor">€'+escHtml(valor)+'</div>' : '')+
        '<div class="op-ts">'+escHtml(ts)+'</div>'+
        '<div class="op-acoes">'+
          '<button class="btn btn-ok" onclick="assinar(\''+p.id+'\',\''+descHex+'\',\''+descSafe.replace(/'/g,"\\u0027")+'\')">✓ ASSINAR</button>'+
          '<button class="btn btn-rej" onclick="rejeitar(\''+p.id+'\')">✗ REJEITAR</button>'+
        '</div>'+
      '</div>';
    }).join('');
  }catch(e){
    document.getElementById('opsList').innerHTML = '<div class="vazio" style="color:var(--red)">erro a carregar propostas: '+escHtml(e.message)+'</div>';
  }
}

function refrescar(){ carregarEstado(); carregarPropostas(); logMsg('actualizado','var(--amber)'); }

async function detectEIP6963(){
  return new Promise(res=>{
    const found=[];
    const h=e=>found.push(e.detail);
    window.addEventListener('eip6963:announceProvider',h);
    window.dispatchEvent(new Event('eip6963:requestProvider'));
    setTimeout(()=>{window.removeEventListener('eip6963:announceProvider',h);res(found);},300);
  });
}

async function ligar(){
  logMsg('a ligar...','var(--amber)');
  const providers = await detectEIP6963();
  if(providers.length>0){
    const prov = providers[0].provider;
    try{
      const accs = await prov.request({method:'eth_requestAccounts'});
      account = accs[0].toLowerCase(); window._activeProv = prov;
      document.getElementById('wAddr').textContent = account.slice(0,6)+'...'+account.slice(-4);
      document.getElementById('wStatus').textContent = ' LIGADA';
      document.getElementById('wStatus').style.color = 'var(--jade)';
      logMsg('wallet: '+account,'var(--jade)');
      try{
        const chainId = await prov.request({method:'eth_chainId'});
        if(chainId !== '0x2105'){
          await prov.request({method:'wallet_switchEthereumChain',params:[{chainId:'0x2105'}]})
            .catch(async()=>await prov.request({method:'wallet_addEthereumChain',params:[{chainId:'0x2105',chainName:'Base',nativeCurrency:{name:'ETH',symbol:'ETH',decimals:18},rpcUrls:['https://mainnet.base.org'],blockExplorerUrls:['https://basescan.org']}]}));
        } else { logMsg('Base 8453 ok','var(--jade)'); }
      }catch(e){ logMsg('rede: '+e.message,'var(--amber)'); }
      return;
    }catch(e){ logMsg('EIP-6963: '+e.message,'var(--amber)'); }
  }
  if(window.ethereum){
    try{
      const accs = await window.ethereum.request({method:'eth_requestAccounts'});
      account = accs[0].toLowerCase(); window._activeProv = window.ethereum;
      document.getElementById('wAddr').textContent = account.slice(0,6)+'...'+account.slice(-4);
      document.getElementById('wStatus').textContent = ' LIGADA';
      document.getElementById('wStatus').style.color = 'var(--jade)';
      logMsg('wallet: '+account,'var(--jade)');
    }catch(e){ logMsg('erro: '+e.message,'var(--red)'); }
  }else{
    logMsg('sem wallet — usa Coinbase Wallet','var(--red)');
    const btn = document.getElementById('cbwallet-btn');
    btn.style.display = 'block';
    btn.href = 'https://go.cb-w.com/dapp?cb_url=' + encodeURIComponent(location.href);
  }
}

async function assinar(id, msgHex, msgLeg){
  if(!account){ await ligar(); if(!account){ logMsg('wallet não ligada','var(--red)'); return; } }
  logMsg('a pedir assinatura...','var(--amber)');
  const prov = window._activeProv || window.ethereum;
  try{
    const sig = await prov.request({method:'personal_sign',params:['0x'+msgHex, account]});
    logMsg('sig: '+sig.slice(0,20)+'...','var(--jade)');
    const r = await fetch(API_ASSINAR, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ id, signature: sig, address: account, message: msgLeg })
    });
    const data = await r.json();
    if(data.ok){
      logMsg('✓ registado','var(--jade)');
      document.getElementById('op-'+id)?.remove();
    } else {
      logMsg('erro: '+JSON.stringify(data),'var(--red)');
    }
  }catch(e){ logMsg('erro: '+e.message,'var(--red)'); }
}

let _rejId = null;
function rejeitar(id){ _rejId = id; document.getElementById('rejbox').style.display = 'block'; }
function fecharRej(){ document.getElementById('rejbox').style.display = 'none'; _rejId = null; }
async function enviarRejeicao(){
  const motivo = document.getElementById('rejMotivo').value || 'sem motivo';
  if(!_rejId) return;
  const r = await fetch(API_ASSINAR + '/rejeitar', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ id: _rejId, motivo })
  });
  const data = await r.json();
  if(data.ok){
    logMsg('rejeitado','var(--red)');
    document.getElementById('op-'+_rejId)?.remove();
    fecharRej();
  }
}

carregarEstado();
carregarPropostas();
if(/Android|iPhone|iPad|CoinbaseBrowser/i.test(navigator.userAgent) && window.ethereum){ ligar(); }
</script>
</body>
</html>
