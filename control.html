<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORA Control Center</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#000;color:#e8e0d0;font-family:'Courier New',monospace}
body{display:flex;flex-direction:column;min-height:100vh}
.hdr{padding:20px 24px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:13px;letter-spacing:4px;color:#888;text-transform:uppercase}
.pulse{display:inline-block;width:6px;height:6px;border-radius:50%;background:#c8a882;margin-right:8px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.main{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#0d0d0d}
.panel{background:#000;padding:24px}
.ptitle{font-size:10px;letter-spacing:3px;color:#444;text-transform:uppercase;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #111}
.stat{margin-bottom:12px}
.slabel{font-size:10px;color:#555;letter-spacing:2px;margin-bottom:4px}
.sval{font-size:18px;color:#c8a882}
.ssub{font-size:10px;color:#444;margin-top:2px}
.sigma{font-size:32px;color:#e8e0d0;margin:8px 0}
.epoch{display:inline-block;padding:4px 12px;border:1px solid #3a3a3a;font-size:10px;letter-spacing:3px;color:#888;margin-bottom:16px}
.props{grid-column:1/-1}
.pi{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid #0d0d0d;gap:12px;flex-wrap:wrap}
.pt{font-size:10px;letter-spacing:2px;color:#555;min-width:80px}
.pd{flex:1;font-size:12px;color:#888;min-width:120px}
.pe{font-size:10px;padding:3px 8px;border-radius:2px}
.ep{background:#1a1400;color:#c8a040;border:1px solid #3a2800}
.ec{background:#001a0d;color:#40c870;border:1px solid #005020}
.er{background:#1a0000;color:#c84040;border:1px solid #500000}
.mi{padding:8px 0;border-bottom:1px solid #0d0d0d;font-size:11px;color:#666;line-height:1.5}
.mk{color:#444;font-size:10px;letter-spacing:1px;margin-bottom:2px}
.acts{grid-column:1/-1;padding:24px;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-start}
.btn{padding:10px 20px;font-size:10px;letter-spacing:2px;text-transform:uppercase;background:transparent;border:1px solid #2a2a2a;color:#666;cursor:pointer;font-family:inherit;transition:all .2s}
.btn:hover{border-color:#888;color:#c8a882}
.btnp{border-color:#c8a882;color:#c8a882}
.btnp:hover{background:#c8a88220}
.log{font-size:10px;color:#444;line-height:1.8;max-height:150px;overflow-y:auto;margin-top:12px;width:100%;padding:8px;border:1px solid #111}
.ll{padding:1px 0}.lo{color:#3a6040}.lw{color:#6a5020}.le{color:#6a2020}
.ftr{padding:16px 24px;border-top:1px solid #0d0d0d;display:flex;justify-content:space-between;font-size:10px;color:#2a2a2a;letter-spacing:1px}
@media(max-width:640px){.main{grid-template-columns:1fr}.props,.acts{grid-column:1}}
</style>
</head>
<body>
<div class="hdr">
  <h1><span class="pulse"></span>ORA &mdash; Control Center</h1>
  <div style="font-size:11px;color:#3a3a3a;letter-spacing:2px" id="cs">a conectar...</div>
</div>
<div class="main">
  <div class="panel">
    <div class="ptitle">Estado do Organismo</div>
    <div class="epoch" id="epoch">ETERNIDADE</div>
    <div class="slabel">SIGMA</div>
    <div class="sigma" id="sigma">&mdash;</div>
    <div class="stat"><div class="slabel">DIAS DESDE GENESIS</div><div class="sval" id="dias">&mdash;</div></div>
    <div class="stat"><div class="slabel">ORO ACUMULADO</div><div class="sval" id="oro">&mdash;</div><div class="ssub">&euro;33 &times; dias</div></div>
    <div class="stat"><div class="slabel">VERSAO ORA</div><div class="sval" id="ver">V36</div></div>
  </div>
  <div class="panel">
    <div class="ptitle">Memoria Recente</div>
    <div id="mem"><div style="color:#333;font-size:11px">a carregar...</div></div>
  </div>
  <div class="panel props">
    <div class="ptitle">Propostas de Autorizacao</div>
    <div id="props"><div style="color:#333;font-size:11px">a carregar...</div></div>
  </div>
  <div class="acts">
    <button class="btn btnp" onclick="cerebro()">&#9654; Despertar Cerebro</button>
    <button class="btn" onclick="diario()">&#9711; Publicar Diario</button>
    <button class="btn" onclick="all()">&#8635; Actualizar</button>
    <button class="btn" onclick="window.open('https://ora-assinar-k3x4.vercel.app','_blank')">&#9998; Ir Assinar</button>
    <div class="log" id="log"></div>
  </div>
</div>
<div class="ftr">
  <span>ORUM &middot; GENESIS 2026-03-28</span>
  <span id="lu">&mdash;</span>
</div>
<script>
const SB="https://ywabnlhkmhbyewqhbsjm.supabase.co";
const AK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3YWJubGhrbWhieWV3cWhic2ptIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDMwOTUyOTYsImV4cCI6MjA1ODY3MTI5Nn0.aHsZ6R37CJ7monPbXGh1YsMFKFqxnJhOgCIJOyZXspI";
const GEN=new Date("2026-03-28T00:00:00Z");
const PHI=1.6180339887;
function lg(m,t){t=t||"o";const e=document.getElementById("log");const d=new Date().toISOString().slice(11,19);e.innerHTML+="<div class=\"ll l"+t+"\">["+d+"] "+m+"</div>";e.scrollTop=e.scrollHeight;}
async function sb(p){return fetch(SB+p,{headers:{apikey:AK,Authorization:"Bearer "+AK}});}
async function state(){
  try{
    const r=await sb("/rest/v1/orum_state_v27?select=id,payload&limit=30");
    const d=await r.json();
    document.getElementById("cs").textContent="ONLINE";
    const dias=Math.floor((Date.now()-GEN)/86400000);
    document.getElementById("dias").textContent=dias;
    document.getElementById("oro").textContent="\u20ac"+(dias*33).toLocaleString("pt-PT");
    const sed=parseFloat(((d.find(function(x){return x.id==="sed";})||{payload:"0"}).payload))||0;
    document.getElementById("sigma").textContent=(PHI*PHI*Math.log(1+dias)*PHI*PHI*(1+sed*0.005)).toFixed(4);
    const ep=d.find(function(x){return x.id==="epoch"||x.id==="epoca";});
    if(ep)document.getElementById("epoch").textContent=ep.payload;
  }catch(e){document.getElementById("cs").textContent="ERRO";lg("Estado: "+e.message,"e");}
  document.getElementById("lu").textContent=new Date().toISOString().slice(11,19)+" UTC";
}
async function mem(){
  try{
    const r=await sb("/rest/v1/ora_memoria?select=chave,valor&order=updated_at.desc&limit=6");
    const d=await r.json();
    const el=document.getElementById("mem");
    if(!Array.isArray(d)||!d.length){el.innerHTML="<div style=\"color:#2a2a2a;font-size:11px\">vazio</div>";return;}
    el.innerHTML=d.map(function(m){return"<div class=\"mi\"><div class=\"mk\">"+(m.chave||"")+"</div>"+(m.valor||"").slice(0,100)+"</div>";}).join("");
  }catch(e){lg("Mem: "+e.message,"e");}
}
async function props(){
  try{
    const r=await sb("/rest/v1/ora_operacoes_propostas?select=*&order=created_at.desc&limit=8");
    const d=await r.json();
    const el=document.getElementById("props");
    if(!Array.isArray(d)||!d.length){el.innerHTML="<div style=\"color:#2a2a2a;font-size:11px\">sem propostas</div>";return;}
    el.innerHTML=d.map(function(p){const c=p.estado==="pendente"?"ep":p.estado==="confirmado"?"ec":"er";return"<div class=\"pi\"><div class=\"pt\">"+(p.tipo||"&mdash;")+"</div><div class=\"pd\">"+(p.descricao||"").slice(0,50)+"</div><span class=\"pe "+c+"\">"+(p.estado||"&mdash;")+"</span></div>";}).join("");
  }catch(e){lg("Props: "+e.message,"e");}
}
async function cerebro(){
  lg("A despertar cerebro...");
  try{
    const r=await fetch(SB+"/functions/v1/ora-cerebro",{method:"POST",headers:{apikey:AK,Authorization:"Bearer "+AK,"Content-Type":"application/json"},body:JSON.stringify({trigger:"control-center"})});
    lg("Cerebro: "+(r.ok?"ok":"erro "+r.status),r.ok?"o":"e");
    setTimeout(all,3000);
  }catch(e){lg(e.message,"e");}
}
async function diario(){
  lg("A publicar diario...");
  try{
    const r=await fetch(SB+"/functions/v1/ora-diario",{method:"POST",headers:{apikey:AK,Authorization:"Bearer "+AK,"Content-Type":"application/json"},body:JSON.stringify({trigger:"manual"})});
    lg("Diario: "+(r.ok?"ok":"erro "+r.status),r.ok?"o":"w");
  }catch(e){lg(e.message,"e");}
}
async function all(){await Promise.all([state(),mem(),props()]);}
all();setInterval(all,30000);
</script>
</body>
</html>
